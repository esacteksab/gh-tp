# Save this to your $HOME directory as `.tp.toml`
# Or save it to the repository's root directory as `.tp.toml`
# Currently expects TOML -- https://toml.io
# TOML is case-sensitive | Keys are mixedCase

# binary: (type: string) The name of the binary, expect either 'tofu' or 'terraform'. Must exist on your $PATH. Only required if both binaries exist on your $PATH.
# binary = ''
# planFile: (type: string) The name of the plan file created by 'gh tp'.
planFile = ''
# mdFile: (type: string) The name of the Markdown file created by 'gh tp'.
mdFile = ''
# useTemplate: (type: bool) Enable default pull request template discovery.
# Default is false for backward compatibility and may become true in a future release.
useTemplate = false
# templateFile: (type: string) Optional path to a pull request template file.
# When set, this file is used regardless of useTemplate.
# When omitted and useTemplate=true, gh tp searches default GitHub locations
# such as .github/pull_request_template.md, docs/pull_request_template.md,
# and pull_request_template.md.
# templateFile = ''
# verbose: (type: bool) Enable Verbose Logging. Default is false.
verbose = false
